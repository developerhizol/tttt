<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус заказа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .payment-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
            text-align: center;
        }
        
        .status-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease-out;
        }
        
        .status-icon.pending {
            animation: pulse 2s ease-in-out infinite;
            color: var(--tg-button-color);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .status-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--tg-text-color);
            margin-bottom: 12px;
        }
        
        .status-message {
            font-size: 16px;
            color: var(--tg-hint-color);
            margin-bottom: 32px;
            max-width: 400px;
            line-height: 1.5;
        }
        
        .order-details {
            background: var(--tg-secondary-bg-color);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 24px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2a3847;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: var(--tg-hint-color);
        }
        
        .detail-value {
            color: var(--tg-text-color);
            font-weight: 500;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--tg-button-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #2b7fd1;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--tg-button-color);
            border: 1px solid var(--tg-button-color);
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: rgba(51, 144, 236, 0.1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="payment-container" id="payment-content"></div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        const orderHash = "{{ order_hash }}";
        let checkInterval;
        let checkCount = 0;
        const maxChecks = 60;
        
        if (tg) {
            tg.ready();
            tg.expand();
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                window.location.href = '/';
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderPending(order) {
            const productText = order.product_type === 'stars' 
                ? `<i class="fas fa-star"></i> ${order.stars} звёзд` 
                : `<i class="fas fa-crown"></i> Premium ${order.months} мес`;
            
            return `
                <div class="status-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="status-title">Ожидание оплаты</div>
                <div class="status-message">
                    Пожалуйста, завершите оплату. Страница автоматически обновится после подтверждения.
                </div>
                <div class="order-details">
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-box"></i> Товар</span>
                        <span class="detail-value">${productText}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-user"></i> Получатель</span>
                        <span class="detail-value"><i class="fas fa-at"></i> ${escapeHtml(order.recipient)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-ruble-sign"></i> Сумма</span>
                        <span class="detail-value">${escapeHtml(order.total.toString())}₽</span>
                    </div>
                </div>
                <div class="timer"><i class="fas fa-spinner fa-spin"></i> Проверка статуса...</div>
            `;
        }
        
        function renderCompleted(order) {
            if (checkInterval) clearInterval(checkInterval);
            
            const productText = order.product_type === 'stars' 
                ? `<i class="fas fa-star"></i> ${order.stars} звёзд` 
                : `<i class="fas fa-crown"></i> Premium ${order.months} мес`;
            
            return `
                <div class="status-icon" style="color: #4caf50;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="status-title" style="color: #4caf50;">Заказ выполнен!</div>
                <div class="status-message">
                    ${productText} успешно отправлены пользователю @${escapeHtml(order.recipient)}
                </div>
                <div class="order-details">
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-hashtag"></i> Заказ</span>
                        <span class="detail-value">#${escapeHtml(order.order_id)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-box"></i> Товар</span>
                        <span class="detail-value">${productText}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-user"></i> Получатель</span>
                        <span class="detail-value"><i class="fas fa-at"></i> ${escapeHtml(order.recipient)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-calendar"></i> Дата</span>
                        <span class="detail-value">${escapeHtml(new Date(order.created_at).toLocaleString('ru'))}</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn-primary" onclick="window.location.href='/'"><i class="fas fa-home"></i> На главную</button>
                    <button class="btn-secondary" onclick="window.location.href='/?tab=transactions'"><i class="fas fa-list"></i> Мои транзакции</button>
                </div>
            `;
        }
        
        function renderFailed(order) {
            if (checkInterval) clearInterval(checkInterval);
            
            return `
                <div class="status-icon" style="color: #f44336;">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="status-title" style="color: #f44336;">Ошибка оплаты</div>
                <div class="status-message">
                    К сожалению, не удалось завершить заказ. Пожалуйста, попробуйте снова.
                </div>
                <div class="order-details">
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-hashtag"></i> Заказ</span>
                        <span class="detail-value">#${escapeHtml(order.order_id)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-ruble-sign"></i> Сумма</span>
                        <span class="detail-value">${escapeHtml(order.total.toString())}₽</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn-primary" onclick="window.location.href='/'"><i class="fas fa-redo"></i> Попробовать снова</button>
                </div>
            `;
        }
        
        function renderOrder(order) {
            const content = document.getElementById('payment-content');
            
            if (order.status === 'pending') {
                content.innerHTML = renderPending(order);
            } else if (order.status === 'completed') {
                content.innerHTML = renderCompleted(order);
            } else {
                content.innerHTML = renderFailed(order);
            }
        }
        
        function checkOrderStatus() {
            checkCount++;
            
            fetch(`/api/order-status/${orderHash}`)
                .then(res => {
                    if (!res.ok) throw new Error('Order not found');
                    return res.json();
                })
                .then(order => {
                    renderOrder(order);
                    
                    if (order.status !== 'pending' || checkCount >= maxChecks) {
                        if (checkInterval) {
                            clearInterval(checkInterval);
                        }
                    }
                })
                .catch(err => {
                    console.error('Error checking order:', err);
                    if (checkCount >= 3) {
                        clearInterval(checkInterval);
                        document.getElementById('payment-content').innerHTML = `
                            <div class="status-icon" style="color: #f44336;">
                                <i class="fas fa-question-circle"></i>
                            </div>
                            <div class="status-title" style="color: #f44336;">Заказ не найден</div>
                            <div class="status-message">Не удалось найти информацию о заказе.</div>
                            <div class="action-buttons">
                                <button class="btn-primary" onclick="window.location.href='/'"><i class="fas fa-home"></i> На главную</button>
                            </div>
                        `;
                    }
                });
        }
        
        checkOrderStatus();
        checkInterval = setInterval(checkOrderStatus, 2000);
        
        window.addEventListener('beforeunload', () => {
            if (checkInterval) clearInterval(checkInterval);
        });
    </script>
</body>
</html>
